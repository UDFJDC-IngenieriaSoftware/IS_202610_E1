services:
  # ─── BACKEND SERVICE (Node.js) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp_bot_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - NODE_ENV=test
      # - NODE_ENV=development
      # Rutas de Puppeteer configuradas en el Dockerfile para el bot local
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      - ./backend:/app
      - /app/node_modules # Evita que se sobrescriban las dependencias del contenedor con el host
      - backend_wwebjs_auth:/app/.wwebjs_auth   # Persistencia para no tener que escanear el QR cada vez
      - backend_wwebjs_cache:/app/.wwebjs_cache
    ports:
      - "3000:3000"
    depends_on:
      - database

  # ─── DATABASE SERVICE (PostgreSQL) ──────────────────────────────────────
  database:
    image: postgres:16-alpine
    container_name: whatsapp_bot_database
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bot_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password # Cambia esto en producción
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─── PGADMIN SERVICE (PostgreSQL GUI) ──────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: whatsapp_bot_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin # Cambia esto en producción
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - database

  # ─── NGINX SERVICE (Reverse Proxy) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: whatsapp_bot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

# ─── VOLUMES CONFIGURATION ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  backend_wwebjs_auth:
    driver: local
  backend_wwebjs_cache:
    driver: local
