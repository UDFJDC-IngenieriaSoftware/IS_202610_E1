services:
  # ─── BACKEND SERVICE (Node.js - Dev Override) ───────────────────────────
  backend:
    restart: unless-stopped
    env_file:
      - ./backend/.env.development
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DB_HOST=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Rutas de Puppeteer configuradas en el Dockerfile para el bot local
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      - ./backend:/app                             # Habilita live-reload (monta código local al contenedor)
      - /app/node_modules                          # Evita que se sobrescriban las dependencias del host
    ports:
      - "3000:3000"                                # Acceso directo al backend si se desea

  # ─── DATABASE SERVICE (PostgreSQL - Dev Override) ───────────────────────
  database:
    restart: unless-stopped
    ports:
      - "5432:5432"                                # Permite conexiones desde el host (ej. DBeaver o pgAdmin)
    environment:
      - POSTGRES_DB=bot_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password

  # ─── REDIS SERVICE (Dev Override) ───────────────────────────────────────
  redis:
    restart: unless-stopped
    ports:
      - "6379:6379"                                # Permite conexión desde el host (ej. redis-cli, RedisInsight)

  # ─── PGADMIN SERVICE (PostgreSQL GUI - Dev Only) ────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: whatsapp_bot_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"                                  # Interfaz web de pgAdmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - database

# ─── VOLUMES CONFIGURATION (Dev Only) ─────────────────────────────────────
volumes:
  pgadmin_data:
    driver: local
